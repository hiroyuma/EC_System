{% extends "shop01/base.html" %}
{% load static %}
{% block title %}管理者ログイン — temuzon{% endblock %}

{% block content %}
<div class="tmz-page">
  <div class="tmz-wrap tmz-sm">
    <div class="tmz-card">
      <h2 class="tmz-card-title">🔐 管理者ログイン</h2>
      <form action="{% url 'shop01:admin_login' %}" method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="tmz-field">
          <label class="tmz-lbl">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<p class="tmz-err">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <div style="margin-top:20px">
          <input type="submit" value="ログイン" style="border:none;width:100%;padding:13px;border-radius:var(--r-md);background:var(--brand);color:#fff;font-family:var(--fb);font-weight:700;font-size:16px;cursor:pointer" />
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
