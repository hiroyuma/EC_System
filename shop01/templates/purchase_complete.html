{% extends "shop01/base.html" %}
{% load static %}
{% block title %}購入完了 — temuzon{% endblock %}

{% block content %}
<script>
(function(){
  /* 🎵 Purchase fanfare */
  try {
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    const ctx=new AC();
    function n(f,t,d,tp,v){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=tp||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.5,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+d);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+d+.05);}
    [[523,.0,.22],[659,.1,.22],[784,.2,.22],[1047,.3,.50]].forEach(([f,t,d])=>n(f,t,d,'sine',.5));
    [[2093,.36,.14],[2637,.42,.14],[3136,.50,.25]].forEach(([f,t,d])=>n(f,t,d,'triangle',.25));
  } catch(e) {}

  /* 🎊 Confetti + fireworks */
  const colors=["#FF5A2C","#FFC02E","#DC1F73","#00A896","#FFD45C","#FF7A4D"];
  const wrap=document.createElement("div");
  Object.assign(wrap.style,{position:"fixed",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",overflow:"hidden",zIndex:"999"});
  for(let i=0;i<120;i++){
    const p=document.createElement("div");
    const circle=i%3===0, sz=6+Math.random()*10;
    Object.assign(p.style,{
      position:"absolute",left:(Math.random()*100)+"%",top:"-20px",
      width:sz+"px",height:circle?sz+"px":(sz*1.9)+"px",
      borderRadius:circle?"50%":"3px",
      background:colors[Math.floor(Math.random()*colors.length)],
      animation:`confettiFall ${1.5+Math.random()*2}s ${Math.random()*2.5}s ease-in both`,
      transform:`rotate(${Math.random()*360}deg)`
    });
    wrap.appendChild(p);
  }
  document.addEventListener("DOMContentLoaded",()=>{
    document.body.appendChild(wrap);
    // Fireworks bursts
    if(window.launchFireworks){
      window.launchFireworks(8);
      setTimeout(()=>window.launchFireworks(6),1400);
      setTimeout(()=>window.launchFireworks(5),2800);
    }
  });
})();
</script>

<div class="tmz-page">
  <div class="tmz-wrap" style="text-align:center;max-width:520px">
    <div style="font-size:72px;margin-bottom:16px;animation:badgePop .7s .3s both cubic-bezier(0.34,1.56,0.64,1)">🎉</div>
    <h2 style="font-family:var(--fd);font-size:30px;font-weight:800;margin-bottom:12px">ご注文ありがとうございました</h2>
    <p style="color:var(--ink-500);margin-bottom:28px">購入処理が完了しました。発送準備が整い次第、ご連絡いたします。</p>
    <div class="tmz-actions" style="justify-content:center">
      <a href="{% url 'shop01:main' %}" class="tmz-btn tmz-btn-p tmz-btn-lg">トップページへ戻る</a>
      <a href="{% url 'shop01:purchase_history' %}" class="tmz-btn tmz-btn-s">購入履歴を見る</a>
    </div>
  </div>
</div>
{% endblock %}
