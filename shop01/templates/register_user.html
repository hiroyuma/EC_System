{% extends "shop01/base.html" %}
{% load static %}
{% block title %}新規会員登録 — temuzon{% endblock %}

{% block content %}
<div class="tmz-page">
  <div class="tmz-wrap tmz-sm">
    <div class="tmz-card">
      <h2 class="tmz-card-title">新規会員登録</h2>
      <form action="{% url 'shop01:register_user' %}" method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="tmz-field">
          <label class="tmz-lbl">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<p class="tmz-err">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <div style="margin-top:20px">
          <input type="submit" value="登録確認へ" style="border:none;width:100%;padding:13px;border-radius:var(--r-md);background:var(--green-600);color:#fff;font-family:var(--fb);font-weight:700;font-size:16px;cursor:pointer" />
        </div>
      </form>
      <div style="margin-top:16px;text-align:center;font-size:14px;color:var(--ink-500)">
        すでにアカウントをお持ちの方は <a href="{% url 'shop01:login' %}" style="font-weight:700">ログイン</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
