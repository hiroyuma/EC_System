{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}temuzon{% endblock %}</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;700&display=swap");

:root {
  --brand:#FF5A2C; --brand-h:#ED4715; --brand-soft:#FFF2EC;
  --green-100:#DCF4E3; --green-600:#178A4D; --green-700:#14743F;
  --red-100:#FCE0DD; --red-600:#CC2D22; --red-700:#A8251C;
  --sun-300:#FFD45C; --teal-500:#00A896;
  --ink-900:#1E1A17; --ink-700:#463E37; --ink-500:#847A71;
  --ink-400:#A89E94; --ink-300:#D2CAC1; --ink-200:#E9E2DB;
  --ink-100:#F4EFE9; --ink-50:#FAF7F3;
  --cream:#FBF8F4; --white:#FFFFFF;
  --fd:"Baloo 2","Noto Sans JP",system-ui,sans-serif;
  --fb:"Nunito","Noto Sans JP",system-ui,sans-serif;
  --r-xs:6px; --r-sm:10px; --r-md:14px; --r-lg:20px; --r-pill:999px;
  --sh-xs:0 1px 2px rgba(30,26,23,.06);
  --sh-sm:0 1px 3px rgba(30,26,23,.08),0 1px 2px rgba(30,26,23,.05);
  --sh-md:0 4px 12px rgba(30,26,23,.08),0 2px 4px rgba(30,26,23,.05);
  --sh-brand:0 10px 24px rgba(255,90,44,.32);
}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:var(--fb);font-size:15px;color:var(--ink-700);background:var(--cream);-webkit-font-smoothing:antialiased;line-height:1.6}
h1,h2,h3,h4{font-family:var(--fd);color:var(--ink-900);margin:0;line-height:1.2;letter-spacing:-0.01em}
a{color:var(--brand);text-decoration:none}
a:hover{text-decoration:underline}
p{margin:0}
img{max-width:100%;display:block}

/* Layout */
.tmz-wrap{max-width:1100px;margin:0 auto;padding:0 24px}
.tmz-page{padding:36px 0}
.tmz-sm{max-width:480px;margin:0 auto}
.tmz-md{max-width:700px;margin:0 auto}
.tmz-lg{max-width:960px;margin:0 auto}

/* Card */
.tmz-card{background:var(--white);border-radius:var(--r-md);border:1px solid var(--ink-200);box-shadow:var(--sh-sm);padding:28px 32px}
.tmz-card+.tmz-card{margin-top:20px}
.tmz-card-title{font-family:var(--fd);font-size:20px;font-weight:700;margin-bottom:18px;color:var(--ink-900)}

/* Header */
.tmz-header{background:var(--white);border-bottom:1px solid var(--ink-200);box-shadow:var(--sh-xs);position:sticky;top:0;z-index:100}
.tmz-header-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;max-width:1100px;margin:0 auto;gap:16px}
.tmz-logo{display:flex;align-items:center;gap:10px;position:relative}
.tmz-logo svg{flex-shrink:0}
.tmz-logo-word{font-family:var(--fd);font-weight:800;font-size:22px;color:var(--ink-900);line-height:1}
.tmz-logo-word span{color:var(--brand)}
.tmz-nav{display:flex;align-items:center;gap:14px;flex-shrink:0}
.tmz-nav a{font-size:13px;font-weight:700;color:var(--ink-700)}
.tmz-nav a:hover{color:var(--brand);text-decoration:none}
.tmz-welcome{font-size:13px;color:var(--ink-500)}
.tmz-welcome b{color:var(--ink-900)}

/* Buttons */
.tmz-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:var(--r-sm);border:1px solid transparent;font-family:var(--fb);font-weight:700;font-size:15px;cursor:pointer;line-height:1.2;transition:background .12s,transform .1s}
.tmz-btn:hover{transform:translateY(-1px);text-decoration:none}
.tmz-btn-sm{padding:7px 14px;font-size:13px}
.tmz-btn-lg{padding:14px 28px;font-size:16px;border-radius:var(--r-md)}
.tmz-btn-block{display:flex;width:100%}
.tmz-btn-p{background:var(--brand);color:#fff;box-shadow:var(--sh-xs)}
.tmz-btn-p:hover{background:var(--brand-h);color:#fff}
.tmz-btn-r{background:var(--green-600);color:#fff}
.tmz-btn-r:hover{background:var(--green-700);color:#fff}
.tmz-btn-d{background:var(--red-600);color:#fff}
.tmz-btn-d:hover{background:var(--red-700);color:#fff}
.tmz-btn-s{background:var(--white);color:var(--brand);border-color:var(--ink-300)}
.tmz-btn-s:hover{background:var(--brand-soft);color:var(--brand)}

/* Inputs */
input[type="text"],input[type="password"],input[type="email"],input[type="number"],select,textarea{
  display:block;width:100%;padding:10px 14px;border:1px solid var(--ink-300);border-radius:var(--r-sm);
  font-family:var(--fb);font-size:15px;color:var(--ink-900);background:var(--white);
  outline:none;transition:border-color .12s,box-shadow .12s}
input[type="text"]:focus,input[type="password"]:focus,input[type="email"]:focus,
input[type="number"]:focus,select:focus,textarea:focus{
  border-color:var(--brand);box-shadow:0 0 0 3px rgba(255,90,44,.2)}
input[type="submit"]{
  display:inline-flex;align-items:center;justify-content:center;
  padding:10px 20px;border-radius:var(--r-sm);border:none;
  background:var(--brand);color:#fff;font-family:var(--fb);font-weight:700;
  font-size:15px;cursor:pointer;transition:background .12s}
input[type="submit"]:hover{background:var(--brand-h)}

/* Form field wrapper */
.tmz-field{margin-bottom:16px}
.tmz-field label,.tmz-lbl{display:block;font-size:13px;font-weight:700;color:var(--ink-700);margin-bottom:6px}
.tmz-field-row{display:grid;grid-template-columns:140px 1fr;gap:8px 16px;align-items:start;padding:10px 0;border-bottom:1px solid var(--ink-100)}
.tmz-field-row:last-of-type{border-bottom:none}
.tmz-field-key{font-size:13px;font-weight:700;color:var(--ink-700);padding-top:2px}

/* Data table */
.tmz-tbl-wrap{border-radius:var(--r-md);overflow:hidden;border:1px solid var(--ink-200)}
.tmz-tbl{width:100%;border-collapse:collapse;font-size:14px}
.tmz-tbl thead th{background:var(--brand);color:#fff;font-weight:700;padding:11px 14px;text-align:left;white-space:nowrap}
.tmz-tbl tbody tr:nth-child(even){background:var(--ink-50)}
.tmz-tbl tbody td{padding:11px 14px;border-bottom:1px solid var(--ink-200);vertical-align:middle}
.tmz-tbl tbody tr:last-child td{border-bottom:none}

/* Inline form inside table cell */
.tmz-tbl .inline-form{display:inline}
.tmz-tbl input[type="number"]{width:70px;padding:6px 8px}
.tmz-tbl input[type="submit"]{padding:6px 12px;font-size:13px;border-radius:var(--r-xs)}

/* Badges */
.tmz-badge{display:inline-flex;padding:4px 11px;border-radius:var(--r-pill);font-size:12px;font-weight:800}
.tmz-ok{background:var(--green-100);color:var(--green-700)}
.tmz-ng{background:var(--red-100);color:var(--red-700)}

/* Errors */
ul.errorlist{color:var(--red-600);font-size:13px;font-weight:600;list-style:none;padding:0;margin:4px 0 0}
ul.errorlist li::before{content:"⚠ "}
.tmz-err{color:var(--red-600);font-size:13px;font-weight:600;margin-top:4px}

/* Price */
.tmz-price{font-family:var(--fd);font-weight:800;color:var(--ink-900)}
.tmz-price-lg{font-size:28px}
.tmz-price-md{font-size:22px}
.tmz-price-sm{font-size:16px}
.tmz-total{display:flex;justify-content:flex-end;align-items:center;gap:12px;padding:16px 14px;background:var(--ink-50);border-top:1px solid var(--ink-200);font-weight:700}

/* Actions */
.tmz-actions{display:flex;gap:12px;align-items:center;margin-top:20px;flex-wrap:wrap}

/* Order card */
.tmz-order{background:var(--white);border:1px solid var(--ink-200);border-radius:var(--r-md);padding:20px 24px;margin-bottom:16px;box-shadow:var(--sh-xs)}
.tmz-order-hd{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.tmz-order-id{font-family:var(--fd);font-weight:700;font-size:15px}
.tmz-order-date{font-size:13px;color:var(--ink-500)}

/* Links row */
.tmz-links{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:14px;font-weight:600}

/* Footer */
.tmz-footer{margin-top:56px;border-top:1px solid var(--ink-200);background:var(--white)}
.tmz-footer-inner{max-width:1100px;margin:0 auto;padding:22px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;font-size:13px;color:var(--ink-500)}
.tmz-footer-brand{display:flex;align-items:center;gap:8px;font-family:var(--fd);font-weight:800;font-size:16px;color:var(--ink-900)}
.tmz-footer-brand span{color:var(--brand)}

/* Effects — all keyframes used across templates */
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes slideInUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:none}}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
@keyframes cardPop{0%{opacity:0;transform:translateY(24px) scale(.9)}70%{transform:translateY(-3px) scale(1.02)}100%{opacity:1;transform:none}}
@keyframes megaBounce{0%{opacity:0;transform:scale(0) rotate(-15deg)}60%{transform:scale(1.12) rotate(3deg)}100%{opacity:1;transform:none}}
@keyframes badgePop{0%{transform:scale(1)}30%{transform:scale(2.2)}60%{transform:scale(.8)}100%{transform:scale(1)}}
@keyframes priceReveal{0%{opacity:0;transform:scale(.6) translateY(12px)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,90,44,.7)}70%{box-shadow:0 0 0 14px rgba(255,90,44,0)}}
@keyframes ripple{to{transform:scale(6);opacity:0}}
@keyframes sparkle{0%{transform:scale(1);opacity:1}100%{transform:translateY(-40px) scale(0) rotate(180deg);opacity:0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes shake{0%,100%{transform:none}15%,45%,75%{transform:translateX(-9px) rotate(-1deg)}30%,60%,90%{transform:translateX(9px) rotate(1deg)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg) scale(1.2)}75%{transform:rotate(12deg) scale(1.2)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0) scale(1)}100%{transform:translateY(110vh) rotate(900deg) scale(.5)}}
@keyframes firework{0%{transform:translate(0,0) scale(1.5);opacity:1}100%{transform:translate(var(--fx,80px),var(--fy,-80px)) scale(0);opacity:0}}
@keyframes scoreFloat{0%{opacity:1;transform:translateY(0) scale(1.4)}100%{opacity:0;transform:translateY(-60px) scale(.8)}}
@keyframes screenFlash{0%{opacity:.55}100%{opacity:0}}
@keyframes rainbow{0%{color:#FF5A2C}25%{color:#FFC02E}50%{color:#DC1F73}75%{color:#00A896}100%{color:#FF5A2C}}
@keyframes floatEmoji{0%{transform:translateY(0) rotate(-8deg);opacity:0}15%{opacity:.85}85%{opacity:.4}100%{transform:translateY(-120px) rotate(22deg);opacity:0}}
@keyframes welcomePop{0%{opacity:0;transform:scale(.7)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes neonText{0%,100%{text-shadow:0 0 4px #fff,0 0 12px #FF5A2C,0 0 24px #FF5A2C}50%{text-shadow:0 0 8px #fff,0 0 24px #FFC02E,0 0 48px #DC1F73}}
@keyframes heroShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes tabIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes expandIn{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}
main{animation:fadeInUp .35s ease-out both}
.tmz-card{transition:transform .2s,box-shadow .2s}
.tmz-card:hover{transform:translateY(-5px) perspective(800px) rotateX(2deg);box-shadow:0 20px 40px rgba(30,26,23,.12)}
</style>
<script>
(function(){
  // --- Ripple on buttons ---
  document.addEventListener("click",function(e){
    const btn=e.target.closest(".tmz-btn,button,input[type='submit']");
    if(!btn)return;
    const r=btn.getBoundingClientRect();
    const rip=document.createElement("span");
    Object.assign(rip.style,{position:"absolute",borderRadius:"50%",pointerEvents:"none",
      width:"100px",height:"100px",background:"rgba(255,255,255,.4)",
      left:(e.clientX-r.left-50)+"px",top:(e.clientY-r.top-50)+"px",
      animation:"ripple .6s ease-out forwards"});
    const prev=btn.style.position;
    btn.style.position="relative"; btn.style.overflow="hidden";
    btn.appendChild(rip); setTimeout(()=>{rip.remove();if(!prev)btn.style.position="";},620);
  });

  // --- Cursor sparkles ---
  let sc=0;
  document.addEventListener("mousemove",function(e){
    if(sc++%8!==0)return;
    const s=document.createElement("span");
    s.textContent=["✨","⭐","💫","🌟","🎀","🎊","🎯","🔥"][Math.floor(Math.random()*8)];
    Object.assign(s.style,{position:"fixed",left:e.clientX+"px",top:e.clientY+"px",
      fontSize:(12+Math.random()*8)+"px",pointerEvents:"none",zIndex:"9999",lineHeight:1,
      animation:"sparkle .8s ease-out forwards",userSelect:"none"});
    document.body.appendChild(s); setTimeout(()=>s.remove(),800);
  });

  // --- Magnetic buttons ---
  function addMag(el){
    if(!el||el.tagName!=="BUTTON"||el.dataset.mag)return;
    el.dataset.mag="1";
    el.addEventListener("mousemove",e=>{const r=el.getBoundingClientRect();const x=(e.clientX-r.left-r.width/2)*.2,y=(e.clientY-r.top-r.height/2)*.2;el.style.transform=`translate(${x}px,${y}px)`;});
    el.addEventListener("mouseleave",()=>{el.style.transform="";});
  }
  const mo=new MutationObserver(ms=>ms.forEach(m=>m.addedNodes.forEach(nn=>{if(nn.querySelectorAll)nn.querySelectorAll("button").forEach(addMag);addMag(nn);})));
  mo.observe(document.body,{childList:true,subtree:true});
  document.querySelectorAll("button").forEach(addMag);

  // --- Scroll progress bar ---
  const prog=document.createElement("div");
  Object.assign(prog.style,{position:"fixed",top:0,left:0,height:"4px",
    background:"linear-gradient(90deg,#FF5A2C,#FFC02E,#DC1F73,#00A896)",
    zIndex:"10000",width:"0%",transition:"width .1s",boxShadow:"0 0 8px rgba(255,90,44,.7)"});
  document.body.prepend(prog);
  window.addEventListener("scroll",()=>{
    const max=document.body.scrollHeight-window.innerHeight;
    prog.style.width=(max>0?window.scrollY/max*100:0)+"%";
  });

  // --- Fireworks ---
  window.launchFireworks=function(count){
    const colors=["#FF5A2C","#FFC02E","#DC1F73","#00A896","#FFD45C","#FF7A4D","#fff","#FBC9DF"];
    for(let b=0;b<(count||7);b++){
      setTimeout(()=>{
        const cx=(15+Math.random()*70)+"vw",cy=(8+Math.random()*50)+"vh";
        for(let i=0;i<28;i++){
          const ang=(i/28)*Math.PI*2,dist=60+Math.random()*120;
          const el=document.createElement("div");
          Object.assign(el.style,{position:"fixed",left:cx,top:cy,
            width:(6+Math.random()*5)+"px",height:(6+Math.random()*5)+"px",
            borderRadius:i%3===0?"50%":"2px",
            background:colors[Math.floor(Math.random()*colors.length)],
            zIndex:9999,pointerEvents:"none",
            "--fx":Math.cos(ang)*dist+"px","--fy":Math.sin(ang)*dist+"px",
            animation:`firework ${.7+Math.random()*.4}s ${Math.random()*.12}s ease-out both`});
          document.body.appendChild(el); setTimeout(()=>el.remove(),1200);
        }
      },b*280);
    }
  };

  // --- Screen flash ---
  window.screenFlash=function(color){
    const el=document.createElement("div");
    Object.assign(el.style,{position:"fixed",inset:0,background:color||"rgba(255,90,44,.25)",
      zIndex:9998,pointerEvents:"none",animation:"screenFlash .45s ease-out forwards"});
    document.body.appendChild(el); setTimeout(()=>el.remove(),460);
  };

  // --- Float score ---
  window.floatScore=function(text,x,y){
    const el=document.createElement("div");
    el.textContent=text;
    Object.assign(el.style,{position:"fixed",left:x+"px",top:y+"px",
      fontFamily:"var(--fd)",fontWeight:900,fontSize:"22px",
      color:"#FF5A2C",pointerEvents:"none",zIndex:9999,
      animation:"scoreFloat 1s ease-out forwards",whiteSpace:"nowrap",
      textShadow:"0 2px 8px rgba(255,90,44,.5)"});
    document.body.appendChild(el); setTimeout(()=>el.remove(),1000);
  };

  // --- Staggered IntersectionObserver card entrance ---
  if(window.IntersectionObserver){
    const obs=new IntersectionObserver(entries=>{
      let i=0; entries.forEach(en=>{
        if(en.isIntersecting){
          en.target.style.animation=`cardPop .5s ${i++*.07}s both cubic-bezier(0.34,1.56,0.64,1)`;
          obs.unobserve(en.target);
        }
      });
    },{threshold:.12});
    document.querySelectorAll(".tmz-card,.tmz-order").forEach(el=>obs.observe(el));
  }

  // --- Konami code ---
  const KON=[38,38,40,40,37,39,37,39,66,65];let ki=0;
  document.addEventListener("keydown",e=>{
    ki=e.keyCode===KON[ki]?ki+1:0;
    if(ki<KON.length)return; ki=0;
    window.launchFireworks(12);
    const msg=document.createElement("div");
    msg.textContent="🎉 KONAMI UNLOCKED 🎉";
    Object.assign(msg.style,{position:"fixed",left:"50%",top:"40%",transform:"translate(-50%,-50%)",
      fontFamily:"var(--fd)",fontSize:"42px",fontWeight:900,
      color:"#FF5A2C",zIndex:10000,pointerEvents:"none",textAlign:"center",
      animation:"megaBounce .8s ease-out both,rainbow 1s .8s infinite",
      textShadow:"0 0 30px rgba(255,90,44,.8)"});
    document.body.appendChild(msg); setTimeout(()=>msg.remove(),3500);
  });
})();
</script>
</head>
<body>

{% block header %}
<header class="tmz-header">
  <div class="tmz-header-inner">
    <a href="{% url 'shop01:main' %}" class="tmz-logo">
      <svg width="34" height="34" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="hg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse"><stop stop-color="#FF7A4D"/><stop offset="1" stop-color="#ED4715"/></linearGradient></defs>
        <rect width="120" height="120" rx="30" fill="url(#hg)"/>
        <path d="M40 46h40a5 5 0 0 1 4.97 5.45l-3.8 36A7 7 0 0 1 74.2 93H45.8a7 7 0 0 1-6.97-5.55l-3.8-36A5 5 0 0 1 40 46Z" fill="#fff"/>
        <path d="M49 49a11 11 0 0 1 22 0" stroke="#FF5A2C" stroke-width="5.5" stroke-linecap="round"/>
        <text x="60" y="79" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#FF5A2C">t</text>
      </svg>
      <span class="tmz-logo-word">temu<span>zon</span></span>
      <svg style="position:absolute;bottom:-5px;left:46px;width:64px;height:11px" viewBox="0 0 100 11" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 3.5 Q50 11 93 3.5" stroke="#FF5A2C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M88 0.5 L94 3.5 L88 6.5" stroke="#FF5A2C" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <nav class="tmz-nav">
      {% if request.session.is_login %}
        <span class="tmz-welcome">ようこそ <b>{{ user_name }}</b> さん</span>
        <a href="{% url 'shop01:cart' %}">🛒 カート</a>
        <a href="{% url 'shop01:user_info' %}">会員情報</a>
        <a href="{% url 'shop01:logout' %}">ログアウト</a>
      {% else %}
        <a href="{% url 'shop01:login' %}" class="tmz-btn tmz-btn-s tmz-btn-sm">ログイン</a>
        <a href="{% url 'shop01:register_user' %}" class="tmz-btn tmz-btn-p tmz-btn-sm">新規登録</a>
      {% endif %}
    </nav>
  </div>
</header>
{% endblock %}

<main>
{% block content %}{% endblock %}
</main>

<footer class="tmz-footer">
  <div class="tmz-footer-inner">
    <div class="tmz-footer-brand">
      <svg width="24" height="24" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="fg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse"><stop stop-color="#FF7A4D"/><stop offset="1" stop-color="#ED4715"/></linearGradient></defs><rect width="120" height="120" rx="30" fill="url(#fg)"/><path d="M40 46h40a5 5 0 0 1 4.97 5.45l-3.8 36A7 7 0 0 1 74.2 93H45.8a7 7 0 0 1-6.97-5.55l-3.8-36A5 5 0 0 1 40 46Z" fill="#fff"/><path d="M49 49a11 11 0 0 1 22 0" stroke="#FF5A2C" stroke-width="5.5" stroke-linecap="round"/><text x="60" y="79" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#FF5A2C">t</text></svg>
      temu<span>zon</span>
    </div>
    <div>オンラインショッピングストア</div>
  </div>
</footer>

</body>
</html>
