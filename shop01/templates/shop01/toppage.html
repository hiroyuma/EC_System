{% extends "shop01/base.html" %}
{% load static %}
{% block title %}temuzon — オンラインショッピングストア{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<div style="background:linear-gradient(135deg,#FF7A4D 0%,#FF5A2C 50%,#ED4715 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px">
  <div style="text-align:center;max-width:480px;width:100%">
    <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px">
      <svg width="64" height="64" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="120" height="120" rx="30" fill="rgba(255,255,255,.2)"/>
        <path d="M40 46h40a5 5 0 0 1 4.97 5.45l-3.8 36A7 7 0 0 1 74.2 93H45.8a7 7 0 0 1-6.97-5.55l-3.8-36A5 5 0 0 1 40 46Z" fill="#fff"/>
        <path d="M49 49a11 11 0 0 1 22 0" stroke="rgba(255,90,44,.7)" stroke-width="5.5" stroke-linecap="round"/>
        <text x="60" y="79" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#FF5A2C">t</text>
      </svg>
      <h1 style="font-family:var(--fd);font-size:52px;font-weight:800;color:#fff;letter-spacing:-0.02em;line-height:1">temu<span style="color:var(--sun-300)">zon</span></h1>
    </div>
    <p style="color:rgba(255,255,255,.85);font-size:18px;font-weight:600;margin-bottom:36px">お買い得商品から毎日の便利アイテムまで 🛍️</p>
    <div style="display:flex;flex-direction:column;gap:12px;max-width:320px;margin:0 auto">
      <a href="{% url 'shop01:login' %}" class="tmz-btn tmz-btn-p tmz-btn-lg tmz-btn-block" style="background:#fff;color:var(--brand);box-shadow:0 8px 20px rgba(0,0,0,.15)">ログイン</a>
      <a href="{% url 'shop01:register_user' %}" class="tmz-btn tmz-btn-lg tmz-btn-block" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.5)">新規登録</a>
      <a href="{% url 'shop01:main' %}" style="color:rgba(255,255,255,.8);font-size:14px;font-weight:600;margin-top:4px">ログインせずに商品を見る →</a>
    </div>
  </div>
</div>
{% endblock %}
