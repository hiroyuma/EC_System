{% extends "shop01/base.html" %}
{% load static %}
{% block title %}会員情報変更 — temuzon{% endblock %}

{% block content %}
<div class="tmz-page">
  <div class="tmz-wrap tmz-sm">
    <div class="tmz-card">
      <h2 class="tmz-card-title">会員情報の変更</h2>
      <form action="{% url 'shop01:update_user' %}" method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="tmz-field">
          <label class="tmz-lbl">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<p class="tmz-err">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <div class="tmz-actions">
          <input type="submit" value="変更確認へ" style="border:none;padding:11px 24px;border-radius:var(--r-sm);background:var(--brand);color:#fff;font-family:var(--fb);font-weight:700;font-size:15px;cursor:pointer" />
          <a href="{% url 'shop01:user_info' %}" class="tmz-btn tmz-btn-s">キャンセル</a>
        </div>
      </form>
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--ink-100)">
        <a href="{% url 'shop01:withdrawconfirm' %}" style="font-size:13px;color:var(--ink-400)">退会する</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
