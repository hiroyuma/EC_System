{% load static %}
<!DOCTYPE html>
<html>

<head>
    <meta http-equiv='Content-Type' content='text/html; charset=UTF-8' />
    <title>Login</title>
    <link rel='stylesheet' type='text/css' href='{% static "shop01/css/style.css" %}' />
</head>

<body>
    <h2>キーワード'{{keyword}}' カテゴリ'{{category}}' の検索結果</h2>
    <div>
    <table border="1">
        <tr>
            <th>商品名</th>
            <th>商品の色</th>
            <th>メーカー名</th>
            <th>価格</th>
        </tr>
        
        {% for item in search_result %}
        <tr>
            <td><a href="{% url 'shop01:item_detail' item.pk %}">{{ item.name }}</a></td>
            <td>{{ item.color }}</td>
            <td>{{ item.manufacture}}</td>
            <td>{{ item.price }}円</td>
        </tr>
        {% endfor %}
    </table>
    </div>
    <div>
        <a href="{% url 'shop01:main' %}">商品検索へ</a>
    </div>
</body>
